name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify backend dependencies install
        run: pip install --no-cache-dir -r backend/requirements.txt

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build
        env:
          VITE_API_URL: https://distributed-ai-task-queue.onrender.com
          VITE_WS_URL: wss://distributed-ai-task-queue.onrender.com
